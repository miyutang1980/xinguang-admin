<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>太平新光分校 後台管理系統</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#2B7A4B;--green-light:#E8F5EE;--green-dark:#1a5c38;
  --orange:#E8863A;--blue:#4A90D9;--purple:#7C3AED;
  --red:#EF4444;--yellow:#F59E0B;
  --bg:#F0F4F8;--surface:#fff;--border:#E2E8F0;
  --text:#1A202C;--text-muted:#718096;
  --sidebar-w:240px;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}

/* ── Login ── */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#1a5c38,#2B7A4B)}
.login-box{background:#fff;border-radius:16px;padding:40px;width:360px;box-shadow:0 20px 60px rgba(0,0,0,0.2)}
.login-box h1{font-size:1.3rem;font-weight:800;color:var(--green);margin-bottom:6px}
.login-box p{font-size:0.85rem;color:var(--text-muted);margin-bottom:28px}
.login-field{margin-bottom:16px}
.login-field label{display:block;font-size:0.82rem;font-weight:700;margin-bottom:6px;color:var(--text)}
.login-field input{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:0.9rem;outline:none;transition:border 0.15s}
.login-field input:focus{border-color:var(--green)}
.login-btn{width:100%;background:var(--green);color:#fff;border:none;border-radius:8px;padding:12px;font-size:0.95rem;font-weight:700;cursor:pointer;margin-top:8px;transition:background 0.15s}
.login-btn:hover{background:var(--green-dark)}
.login-err{color:var(--red);font-size:0.82rem;margin-top:8px;display:none}

/* ── App Layout ── */
#appScreen{display:none;flex:1;flex-direction:row;min-height:100vh}

/* Sidebar */
.sidebar{width:var(--sidebar-w);background:var(--green-dark);color:#fff;display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100}
.sidebar-logo{padding:20px 20px 16px;border-bottom:1px solid rgba(255,255,255,0.1)}
.sidebar-logo strong{font-size:1rem;font-weight:800;display:block}
.sidebar-logo span{font-size:0.72rem;opacity:0.6}
.sidebar-menu{flex:1;padding:12px 0;overflow-y:auto}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:11px 20px;cursor:pointer;font-size:0.875rem;font-weight:600;color:rgba(255,255,255,0.75);transition:all 0.15s;border-left:3px solid transparent}
.sidebar-item:hover{background:rgba(255,255,255,0.08);color:#fff}
.sidebar-item.active{background:rgba(255,255,255,0.12);color:#fff;border-left-color:#7DFFB3}
.sidebar-item .badge{margin-left:auto;background:var(--orange);color:#fff;border-radius:50px;padding:2px 8px;font-size:0.7rem;font-weight:800}
.sidebar-bottom{padding:16px 20px;border-top:1px solid rgba(255,255,255,0.1)}
.sidebar-bottom button{background:rgba(255,255,255,0.1);border:none;color:#fff;padding:8px 14px;border-radius:6px;cursor:pointer;font-size:0.8rem;width:100%}
.sidebar-bottom button:hover{background:rgba(255,255,255,0.2)}

/* Main */
.main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar h2{font-size:1.15rem;font-weight:800}
.topbar-actions{display:flex;gap:10px;align-items:center}
.btn{padding:8px 16px;border-radius:7px;font-size:0.82rem;font-weight:700;cursor:pointer;border:none;transition:all 0.15s;display:inline-flex;align-items:center;gap:6px}
.btn-green{background:var(--green);color:#fff}.btn-green:hover{background:var(--green-dark)}
.btn-outline{background:#fff;color:var(--text);border:1.5px solid var(--border)}.btn-outline:hover{border-color:var(--green);color:var(--green)}
.btn-red{background:var(--red);color:#fff}
.content{padding:28px;flex:1}

/* Dashboard */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px;margin-bottom:28px}
.stat-card{background:#fff;border-radius:12px;padding:20px;border:1px solid var(--border)}
.stat-card .num{font-size:2rem;font-weight:800;line-height:1}
.stat-card .label{font-size:0.78rem;color:var(--text-muted);margin-top:6px;font-weight:600}
.stat-card .sub{font-size:0.72rem;color:var(--text-muted);margin-top:4px}

/* Table */
.table-wrap{background:#fff;border-radius:12px;border:1px solid var(--border);overflow:hidden}
.table-toolbar{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.table-toolbar input[type=text]{padding:8px 12px;border:1.5px solid var(--border);border-radius:7px;font-size:0.85rem;outline:none;width:220px}
.table-toolbar input:focus{border-color:var(--green)}
.table-toolbar select{padding:8px 12px;border:1.5px solid var(--border);border-radius:7px;font-size:0.85rem;outline:none;background:#fff}
.data-table{width:100%;border-collapse:collapse;font-size:0.82rem}
.data-table th{background:#F7FAFC;padding:10px 14px;text-align:left;font-weight:700;font-size:0.75rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.04em;border-bottom:1px solid var(--border)}
.data-table td{padding:11px 14px;border-bottom:1px solid #F0F4F8;vertical-align:top;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:hover td{background:#F7FAFC}
.badge-status{display:inline-flex;align-items:center;padding:3px 9px;border-radius:50px;font-size:0.72rem;font-weight:700}
.badge-pending{background:#FEF3C7;color:#92400E}
.badge-contacted{background:#DBEAFE;color:#1E40AF}
.badge-arranged{background:#D1FAE5;color:#065F46}
.badge-enrolled{background:#EDE9FE;color:#5B21B6}
.badge-cancelled{background:#FEE2E2;color:#991B1B}

/* Detail Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:16px;width:100%;max-width:680px;max-height:90vh;overflow-y:auto;box-shadow:0 25px 60px rgba(0,0,0,0.3)}
.modal-header{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:10}
.modal-header h3{font-size:1rem;font-weight:800}
.modal-close{background:none;border:none;font-size:1.3rem;cursor:pointer;color:var(--text-muted);padding:4px 8px}
.modal-body{padding:24px}
.detail-row{display:flex;margin-bottom:12px;font-size:0.87rem}
.detail-label{width:110px;flex-shrink:0;font-weight:700;color:var(--text-muted)}
.detail-val{flex:1;word-break:break-word;white-space:pre-wrap}
.detail-section{font-weight:800;font-size:0.8rem;color:var(--green);text-transform:uppercase;letter-spacing:0.06em;margin:16px 0 8px;padding-bottom:6px;border-bottom:2px solid var(--green-light)}
.script-box{background:#1E2A20;color:#7DFFB3;border-radius:8px;padding:14px;font-size:0.78rem;line-height:1.7;white-space:pre-wrap;font-family:monospace;max-height:300px;overflow-y:auto}
.status-select{padding:6px 10px;border:1.5px solid var(--border);border-radius:6px;font-size:0.82rem;background:#fff;cursor:pointer}

/* Child cards */
.child-card{background:var(--green-light);border-radius:8px;padding:12px 14px;margin-bottom:8px;font-size:0.85rem}
.child-card strong{color:var(--green-dark)}

/* Empty state */
.empty-state{text-align:center;padding:60px 20px;color:var(--text-muted)}
.empty-state .icon{font-size:3rem;margin-bottom:12px}
.empty-state p{font-size:0.9rem}

/* Tabs inside sections */
.section-tabs{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap}
.section-tab{padding:7px 16px;border-radius:50px;border:1.5px solid var(--border);font-size:0.82rem;font-weight:600;cursor:pointer;background:#fff;color:var(--text-muted);transition:all 0.15s}
.section-tab.active{background:var(--green);color:#fff;border-color:var(--green)}

/* Notification toast */
.toast{position:fixed;bottom:24px;right:24px;background:#1E2A20;color:#7DFFB3;padding:12px 20px;border-radius:10px;font-size:0.85rem;font-weight:600;z-index:300;transform:translateY(80px);opacity:0;transition:all 0.3s}
.toast.show{transform:translateY(0);opacity:1}

@media(max-width:768px){
  .sidebar{width:100%;height:auto;position:relative}
  .main{margin-left:0}
  #appScreen{flex-direction:column}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <h1>🏫 太平新光分校</h1>
    <p>後台管理系統 · 請登入</p>
    <div class="login-field">
      <label>帳號</label>
      <input type="text" id="loginUser" placeholder="admin" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="login-field">
      <label>密碼</label>
      <input type="password" id="loginPass" placeholder="••••••" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="login-btn" onclick="doLogin()">登入</button>
    <div class="login-err" id="loginErr">帳號或密碼錯誤</div>
  </div>
</div>

<!-- APP -->
<div id="appScreen">
  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="sidebar-logo">
      <strong>太平新光分校</strong>
      <span>後台管理系統</span>
    </div>
    <div class="sidebar-menu">
      <div class="sidebar-item active" onclick="switchSection('dashboard')" id="nav-dashboard">
        📊 儀表板
      </div>
      <div class="sidebar-item" onclick="switchSection('inquiry')" id="nav-inquiry">
        📋 問課諮詢 <span class="badge" id="badge-inquiry">0</span>
      </div>
      <div class="sidebar-item" onclick="switchSection('booking')" id="nav-booking">
        📅 預約紀錄 <span class="badge" id="badge-booking">0</span>
      </div>
      <div class="sidebar-item" onclick="switchSection('camp')" id="nav-camp">
        🏕️ 夏令營報名 <span class="badge" id="badge-camp">0</span>
      </div>
      <div class="sidebar-item" onclick="switchSection('assess')" id="nav-assess">
        📝 分級檢測 <span class="badge" id="badge-assess">0</span>
      </div>
      <div class="sidebar-item" onclick="switchSection('register')" id="nav-register">
        🎓 正式報名 <span class="badge" id="badge-register">0</span>
      </div>
    </div>
      <div class="sidebar-item" onclick="switchSection('trial')" id="nav-trial">
        🗓️ 體驗課排班
      </div>
    <div class="sidebar-bottom">
      <button onclick="doLogout()">登出</button>
    </div>
  </nav>

  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <h2 id="pageTitle">儀表板</h2>
      <div class="topbar-actions">
        <span id="topbarTime" style="font-size:0.78rem;color:var(--text-muted)"></span>
        <button class="btn btn-outline" onclick="importJSON()" title="匯入 JSON 備份或從主網站複製的資料">⬆ 匯入資料</button>
        <button class="btn btn-outline" onclick="exportJSON()">💾 備份 JSON</button>
        <button class="btn btn-outline" onclick="exportCSV()">⬇ 匯出 CSV</button>
        <button class="btn btn-red" style="font-size:0.78rem;padding:6px 12px" onclick="clearAllData()">清除</button>
      </div>
    </div>
    <div class="content" id="mainContent">
      <!-- 動態內容 -->
    </div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">詳細資料</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ── 設定 ──────────────────────────────────────────────────
const ADMIN_USERS = { 'admin': 'xinguang2026', 'teacher': 'teacher123' };
// 資料存在記憶體，請用匯出/匯入 JSON 備份

// ── 資料層（記憶體 + JSON 匯出/匯入）────────────────────────
var _DB = {"inquiries": [], "bookings": [], "camp": [], "assessments": [], "registrations": []};

function loadData() { return _DB; }
function saveData(data) { _DB = data; updateBadges(data); }
function emptyData() {
  return { inquiries:[], bookings:[], camp:[], assessments:[], registrations:[] };
}

// ── 登入 ──────────────────────────────────────────────────
var _loggedIn = false;
function doLogin() {
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value;
  if (ADMIN_USERS[u] && ADMIN_USERS[u] === p) {
    _loggedIn = true;
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appScreen').style.display = 'flex';
    initApp();
  } else {
    document.getElementById('loginErr').style.display = 'block';
  }
}
function doLogout() {
  _loggedIn = false;
  document.getElementById('appScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  _DB = emptyData();
}
function checkSession() {
  // No persistent session - always show login
}

// ── 初始化 ────────────────────────────────────────────────
let currentSection = 'dashboard';
function initApp() {
  setInterval(() => {
    document.getElementById('topbarTime').textContent = new Date().toLocaleString('zh-TW');
  }, 1000);
  updateBadges(loadData());
  switchSection('dashboard');
  // 主網站資料可透過「匯入 JSON」功能載入
}

function updateBadges(data) {
  const counts = {
    inquiry: data.inquiries.filter(r=>r.status==='待回電'||!r.status).length,
    booking: data.bookings.filter(r=>r.status==='待確認').length,
    camp: data.camp.filter(r=>r.status==='待確認').length,
    assess: data.assessments.filter(r=>!r.finalClass).length,
    register: data.registrations.filter(r=>r.status==='待處理').length,
  };
  Object.entries(counts).forEach(([k,v]) => {
    const el = document.getElementById('badge-'+k);
    if(el) { el.textContent = v; el.style.display = v > 0 ? '' : 'none'; }
  });
}

function switchSection(sec) {
  currentSection = sec;
  document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
  const navEl = document.getElementById('nav-'+sec);
  if(navEl) navEl.classList.add('active');
  const titles = {
    dashboard:'儀表板', inquiry:'問課諮詢', booking:'預約紀錄',
    camp:'夏令營報名', assess:'分級檢測', register:'正式報名',
    trial:'🗓️ 體驗課排班'
  };
  document.getElementById('pageTitle').textContent = titles[sec] || sec;
  const content = document.getElementById('mainContent');
  if(sec === 'dashboard') renderDashboard(content);
  else if(sec === 'inquiry') renderInquiry(content);
  else if(sec === 'booking') renderBooking(content);
  else if(sec === 'camp') renderCamp(content);
  else if(sec === 'assess') renderAssess(content);
  else if(sec === 'register') renderRegister(content);
  else if(sec === 'trial') renderTrial(content);
}

// ── 儀表板 ────────────────────────────────────────────────
function renderDashboard(el) {
  const d = loadData();
  const pending_inquiry = d.inquiries.filter(r=>!r.status||r.status==='待回電').length;
  const pending_booking = d.bookings.filter(r=>r.status==='待確認').length;
  const pending_camp    = d.camp.filter(r=>r.status==='待確認').length;
  const pending_assess  = d.assessments.filter(r=>!r.finalClass).length;

  el.innerHTML = `
    <div class="stat-grid">
      <div class="stat-card" style="border-left:4px solid var(--green)">
        <div class="num" style="color:var(--green)">${d.inquiries.length}</div>
        <div class="label">📋 問課諮詢</div>
        <div class="sub">${pending_inquiry} 筆待回電</div>
      </div>
      <div class="stat-card" style="border-left:4px solid var(--blue)">
        <div class="num" style="color:var(--blue)">${d.bookings.length}</div>
        <div class="label">📅 預約紀錄</div>
        <div class="sub">${pending_booking} 筆待確認</div>
      </div>
      <div class="stat-card" style="border-left:4px solid var(--orange)">
        <div class="num" style="color:var(--orange)">${d.camp.length}</div>
        <div class="label">🏕️ 夏令營報名</div>
        <div class="sub">${pending_camp} 筆待確認</div>
      </div>
      <div class="stat-card" style="border-left:4px solid var(--purple)">
        <div class="num" style="color:var(--purple)">${d.assessments.length}</div>
        <div class="label">📝 分級檢測</div>
        <div class="sub">${pending_assess} 筆未完成分班</div>
      </div>
      <div class="stat-card" style="border-left:4px solid #10B981">
        <div class="num" style="color:#10B981">${d.registrations.length}</div>
        <div class="label">🎓 正式報名</div>
        <div class="sub">${d.registrations.filter(r=>r.status==='待處理').length} 筆待處理</div>
      </div>
    </div>
    <div class="table-wrap">
      <div class="table-toolbar"><strong style="font-size:0.85rem">最新動態（最近 10 筆）</strong></div>
      <table class="data-table">
        <thead><tr><th>時間</th><th>類型</th><th>家長/學生</th><th>內容</th><th>狀態</th></tr></thead>
        <tbody id="recentRows"></tbody>
      </table>
    </div>`;

  // Recent activity
  const all = [
    ...d.inquiries.map(r=>({...r, _type:'問課'})),
    ...d.bookings.map(r=>({...r, _type:'預約'})),
    ...d.camp.map(r=>({...r, _type:'夏令營'})),
    ...d.assessments.map(r=>({...r, _type:'檢測'})),
    ...d.registrations.map(r=>({...r, _type:'報名'})),
  ].sort((a,b)=>new Date(b.ts)-new Date(a.ts)).slice(0,10);

  const tbody = document.getElementById('recentRows');
  if(!all.length) {
    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--text-muted);padding:30px">尚無資料</td></tr>';
    return;
  }
  tbody.innerHTML = all.map(r => {
    const name = r.parent || r.pname || r.studentName || '—';
    const content = r._type==='問課' ? (r.classes||'—') :
                    r._type==='預約' ? (r.date+' '+r.slot) :
                    r._type==='夏令營' ? (r.sname||'—') :
                    r._type==='檢測' ? (r.finalClass||'待分班') :
                    (r.classType||'—');
    const status = r.status || (r._type==='檢測' ? (r.finalClass?'已分班':'待分班') : '待處理');
    const badgeClass = status.includes('待')||status.includes('未') ? 'badge-pending' :
                       status.includes('已') ? 'badge-arranged' :
                       status.includes('報名') ? 'badge-enrolled' : 'badge-contacted';
    return `<tr>
      <td style="white-space:nowrap">${(r.ts||'').substring(0,16)}</td>
      <td><span class="badge-status badge-pending" style="background:#EEF2FF;color:#4338CA">${r._type}</span></td>
      <td>${name}</td>
      <td title="${content}">${content.length>20?content.substring(0,20)+'…':content}</td>
      <td><span class="badge-status ${badgeClass}">${status}</span></td>
    </tr>`;
  }).join('');
}

// ── 問課諮詢 ──────────────────────────────────────────────
function renderInquiry(el) {
  const d = loadData();
  const rows = d.inquiries;
  const statusOpts = ['待回電','已回電','已安排檢測','已報名','不感興趣'];
  el.innerHTML = `
    <div class="table-wrap">
      <div class="table-toolbar">
        <input type="text" id="searchInquiry" placeholder="搜尋姓名、電話、Email…" oninput="renderInquiry(document.getElementById('mainContent'))">
        <select id="filterInquiryStatus" onchange="renderInquiry(document.getElementById('mainContent'))">
          <option value="">全部狀態</option>
          ${statusOpts.map(s=>`<option>${s}</option>`).join('')}
        </select>
        <span style="margin-left:auto;font-size:0.8rem;color:var(--text-muted)">共 ${rows.length} 筆</span>
      </div>
      <table class="data-table">
        <thead><tr><th>#</th><th>時間</th><th>家長</th><th>電話</th><th>Email</th><th>孩子/預判程度</th><th>感興趣班型</th><th>狀態</th><th>操作</th></tr></thead>
        <tbody id="inquiryTbody"></tbody>
      </table>
    </div>`;

  const kw = (document.getElementById('searchInquiry')||{}).value||'';
  const fs = (document.getElementById('filterInquiryStatus')||{}).value||'';
  let filtered = rows.filter(r => {
    const match = !kw || [r.parent,r.phone,r.email,r.line].join(' ').includes(kw);
    const statusMatch = !fs || r.status===fs;
    return match && statusMatch;
  });

  const tbody = document.getElementById('inquiryTbody');
  if(!filtered.length) {
    tbody.innerHTML = `<tr><td colspan="9" class="empty-state"><div class="icon">📋</div><p>尚無資料</p></td></tr>`;
    return;

          <option value="">依分數自動計算</option>

function autoCalcClass() {
  const paper = (document.getElementById('as_written_paper')||{}).value;
  const score = parseFloat((document.getElementById('as_written_score')||{}).value||0);
  const maxMap = {Starter:65, G1:91, G2:79, G3:83, G4:100, G5:90};
  const max = maxMap[paper];
  const sel = document.getElementById('as_final_class');
  if(!sel || sel.value) return; // Manual override
  if(!max || !score) return;
  const t = score/max;
  const grade = paper === 'Starter' ? '' : paper;
  const sub = t < 1/3 ? 'A' : t < 2/3 ? 'B' : 'C';
  const result = paper==='Starter' ? ('S'+sub) : (grade.replace('G','')+sub);
  sel.value = result;
}

function updateStatus(collection, idx, newStatus) {
  const data = loadData();
  if(data[collection] && data[collection][idx]) {
    data[collection][idx].status = newStatus;
    saveData(data);
    showToast('✅ 狀態已更新：' + newStatus);
  }
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

    bookings:  ['預約紀錄','時間,家長,電話,孩子,預約類型,日期,時段,狀態'],
    camp:      ['夏令營','時間,家長,電話,學生,年級,報名期別,早鳥折扣,狀態,孩子人數'],
    assessments:['分級檢測','時間,學生,年級,口說級,口說分,閱讀停止,筆試卷,筆試分,分班結果'],
    registrations:['正式報名','時間,家長,電話,學生,年級,學校,班級,班型,分班,附加服務,開始日,狀態'],
  };
  const rows = {
    inquiries: data.inquiries.map(r=>[r.ts,r.parent,r.phone,r.email,r.line,r.classes,(r.children||[]).map(c=>c.oral&&c.oral.predictedOralLevel).join('/'),r.question].join(',')),
    bookings:  data.bookings.map(r=>[r.ts,r.parent,r.phone,r.child,r.bookingType,r.date,r.slot,r.status].join(',')),
    camp:      data.camp.map(r=>[r.ts,r.pname,r.phone,r.sname,r.grade,'"'+String(r.courses||'').replace(/"/g,'""')+'"',r.earlyBird?'是':'否',r.status,r.children?r.children.length:'1'].join(',')),
    assessments:data.assessments.map(r=>[r.ts,r.studentName,r.grade,r.oralLevel,r.oralScore,r.readingStop,r.writtenPaper,r.writtenScore,r.finalClass].join(',')),
    registrations:data.registrations.map(r=>[r.ts,r.parent,r.phone,r.studentName,r.grade,r.classType,r.assessResult,r.startDate,r.status].join(',')),
  };

  let csv = '\uFEFF'; // BOM for Excel
  Object.entries(sectionMap).forEach(([key,[name,header]])=>{
    csv += `\n=== ${name} ===\n${header}\n${rows[key].join('\n')}\n`;
  });

  const blob = new Blob([csv], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = '太平新光後台資料_' + new Date().toLocaleDateString('zh-TW') + '.csv';
  a.click();

function getTrialDatesAdmin(){

    '2027-12-25'
  ];
  // 範圍：今天起 3 個月（90 天）
  var today=new Date();
  var startMs=Date.UTC(today.getUTCFullYear(),today.getUTCMonth(),today.getUTCDate());
  var endMs=startMs+180*24*60*60*1000; // 半年
  var _cur=new Date(startMs);
  var _end=new Date(endMs);
  while(_cur<=_end){
    var dow=_cur.getUTCDay();
    var ds=_cur.toISOString().slice(0,10);
    if(dow>=1&&dow<=5&&holidays.indexOf(ds)===-1) dates.push(ds);
    _cur=new Date(_cur.getTime()+86400000);
  }
  return dates;
}

<script>
/**
 * ════════════════════════════════════════════════════════════════════
 *  太平新光分校 管理後台 — Google Sheets 同步模組
 *  檔案：admin-sheets-sync.js
 *
 *  用途：
 *    將此腳本貼入 xinguang-admin/index.html 的 <script> 區塊，
 *    並在頁面適當位置加入同步按鈕：
 *
 *    <button onclick="syncFromSheets()" id="btnSheetsSync"
 *      style="background:#2B7A4B;color:#fff;border:none;border-radius:8px;
 *             padding:10px 20px;font-size:0.95rem;cursor:pointer;font-weight:700;">
 *      📊 從 Google Sheets 同步
 *    </button>
 *
 *  資料來源（以公開 CSV 匯出端點讀取，無需 OAuth，僅限公開試算表）：
 *    Google Sheets ID: 1Q3lZwp8BiA6dcz5Bu_WLOitn-a_4O1Z0jDQoG6VMC7w
 *    工作表：問課諮詢 / 預約紀錄 / 夏令營報名 / 正式註冊
 *
 *  對應欄位：
 *    問課諮詢  → _DB.inquiries
 *    預約紀錄  → _DB.bookings
 *    夏令營報名 → _DB.camp
 *    正式註冊  → _DB.registrations
 * ════════════════════════════════════════════════════════════════════
 */

(function () {

  // ──────────────────────────────────────────────────────────────────
  // 設定常數
  // ──────────────────────────────────────────────────────────────────

  /** Google Sheets 試算表 ID */
  var SHEET_ID = '1Q3lZwp8BiA6dcz5Bu_WLOitn-a_4O1Z0jDQoG6VMC7w';

  /**
   * 以 gviz/tq CSV 端點讀取各工作表。
   * 試算表須設為「任何人可以查看」才能公開存取。
   */
  var SHEETS = {
    inquiries:     '問課諮詢',
    bookings:      '預約紀錄',
    camp:          '夏令營報名',
    registrations: '正式註冊'
  };

  /**
   * 組合 CSV 匯出 URL
   * @param {string} sheetName - 工作表名稱（中文亦支援，會自動 encode）
   * @returns {string} 完整 URL
   */
  function csvUrl(sheetName) {
    return (
      'https://docs.google.com/spreadsheets/d/' +
      SHEET_ID +
      '/gviz/tq?tqx=out:csv&sheet=' +
      encodeURIComponent(sheetName)
    );
  }

  // ──────────────────────────────────────────────────────────────────
  // CSV 解析工具
  // ──────────────────────────────────────────────────────────────────

  /**
   * 簡易 CSV 解析器，支援帶引號的欄位與換行。
   * @param {string} text - 原始 CSV 字串
   * @returns {string[][]} 二維陣列（列 × 欄）
   */
  function parseCsv(text) {
    var rows = [];
    var row  = [];
    var cell = '';
    var inQ  = false; // 是否在引號內

    for (var i = 0; i < text.length; i++) {
      var ch = text[i];
      var next = text[i + 1];

      if (inQ) {
        if (ch === '"' && next === '"') {
          // 跳脫引號 ""
          cell += '"';
          i++;
        } else if (ch === '"') {
          inQ = false;
        } else {
          cell += ch;
        }
      } else {
        if (ch === '"') {
          inQ = true;
        } else if (ch === ',') {
          row.push(cell.trim());
          cell = '';
        } else if (ch === '\n' || (ch === '\r' && next === '\n')) {
          row.push(cell.trim());
          rows.push(row);
          row  = [];
          cell = '';
          if (ch === '\r') i++; // 跳過 \n（CR+LF）
        } else {
          cell += ch;
        }
      }
    }

    // 最後一格 / 最後一列
    row.push(cell.trim());
    if (row.some(function (c) { return c !== ''; })) {
      rows.push(row);
    }

    return rows;
  }

  /**
   * 將二維陣列（第一列為標頭）轉為物件陣列。
   * @param {string[][]} rows
   * @returns {Object[]}
   */
  function rowsToObjects(rows) {
    if (!rows || rows.length < 2) return [];
    var headers = rows[0];
    return rows.slice(1).map(function (row) {
      var obj = {};
      headers.forEach(function (h, i) {
        obj[h] = row[i] !== undefined ? row[i] : '';
      });
      return obj;
    });
  }

  // ──────────────────────────────────────────────────────────────────
  // 欄位對應（Sheets 欄位名稱 → _DB 欄位名稱）
  // ──────────────────────────────────────────────────────────────────

  /**
   * 問課諮詢 → _DB.inquiries
   * 欄位：時間戳記、家長姓名、電話、Email、LINE ID、孩子姓名（可能多筆）、班型、問題、狀態
   */
  function mapInquiry(row) {
    // 孩子姓名可能存在「孩子姓名」或「孩子1」等欄位；彈性處理
    var childrenNames = [];
    ['孩子姓名', '孩子1', '孩子2', '孩子3'].forEach(function (k) {
      if (row[k] && row[k].trim()) childrenNames.push({ name: row[k].trim() });
    });

    return {
      ts:       row['時間戳記'] || row['時間'] || row['Timestamp'] || '',
      parent:   row['家長姓名'] || row['家長'] || row['姓名'] || '',
      phone:    row['電話'] || row['手機'] || '',
      email:    row['Email'] || row['電子郵件'] || '',
      line:     row['LINE ID'] || row['LINE'] || '',
      children: childrenNames,
      classes:  row['班型'] || row['有興趣的課程'] || '',
      question: row['問題'] || row['想詢問的問題'] || '',
      status:   row['狀態'] || 'new'
    };
  }

  /**
   * 預約紀錄 → _DB.bookings
   * 欄位：時間戳記、家長姓名、電話、孩子姓名、類型、日期、時段、狀態
   */
  function mapBooking(row) {
    return {
      ts:          row['時間戳記'] || row['時間'] || row['Timestamp'] || '',
      parent:      row['家長姓名'] || row['家長'] || row['姓名'] || '',
      phone:       row['電話'] || row['手機'] || '',
      child:       row['孩子姓名'] || row['孩子'] || '',
      bookingType: row['類型'] || row['預約類型'] || '',
      date:        row['日期'] || '',
      slot:        row['時段'] || '',
      status:      row['狀態'] || 'pending'
    };
  }

  /**
   * 夏令營報名 → _DB.camp
   * 欄位：時間戳記、家長、電話、LINE ID、孩子、課程、飲食需求、狀態
   */
  function mapCamp(row) {
    return {
      ts:      row['時間戳記'] || row['時間'] || row['Timestamp'] || '',
      pname:   row['家長'] || row['家長姓名'] || row['姓名'] || '',
      phone:   row['電話'] || row['手機'] || '',
      line:    row['LINE ID'] || row['LINE'] || '',
      sname:   row['孩子'] || row['孩子姓名'] || '',
      courses: row['課程'] || row['報名課程'] || '',
      diet:    row['飲食'] || row['飲食需求'] || row['飲食限制'] || '',
      status:  row['狀態'] || 'new'
    };
  }

  /**
   * 正式註冊 → _DB.registrations
   * 欄位：時間、家長、電話、Email、學生、年級、班型、分班、附加服務、狀態
   */
  function mapRegistration(row) {
    return {
      ts:           row['時間'] || row['時間戳記'] || row['Timestamp'] || '',
      parent:       row['家長'] || row['家長姓名'] || row['姓名'] || '',
      phone:        row['電話'] || row['手機'] || '',
      email:        row['Email'] || row['電子郵件'] || '',
      studentName:  row['學生'] || row['學生姓名'] || '',
      grade:        row['年級'] || '',
      classType:    row['班型'] || '',
      assessResult: row['分班'] || row['分班結果'] || '',
      addons:       row['附加服務'] || '',
      status:       row['狀態'] || 'active'
    };
  }

  // ──────────────────────────────────────────────────────────────────
  // 主要同步函式（公開至全域）
  // ──────────────────────────────────────────────────────────────────

  /**
   * syncFromSheets()
   * 從 Google Sheets 讀取四個工作表，更新 _DB，存檔並重整畫面。
   *
   * 使用方式：
   *   直接呼叫 syncFromSheets() 或綁定到按鈕的 onclick 事件。
   */
  window.syncFromSheets = function () {

    // 顯示載入狀態
    var btn = document.getElementById('btnSheetsSync');
    if (btn) {
      btn.disabled     = true;
      btn.textContent  = '⏳ 同步中…';
    }

    var notify = document.getElementById('sheetsSyncStatus');
    if (notify) {
      notify.textContent = '';
      notify.style.color = '#7B8794';
    }

    // 決定要抓取哪些工作表
    var tasks = [
      { key: 'inquiries',     sheet: SHEETS.inquiries,     mapper: mapInquiry     },
      { key: 'bookings',      sheet: SHEETS.bookings,      mapper: mapBooking     },
      { key: 'camp',          sheet: SHEETS.camp,          mapper: mapCamp        },
      { key: 'registrations', sheet: SHEETS.registrations, mapper: mapRegistration}
    ];

    var results    = {};   // { key: [mapped objects] }
    var errors     = [];   // 失敗的工作表名稱
    var pending    = tasks.length;

    /**
     * 所有工作表都完成後（無論成功或失敗）執行此函式：
     * 將結果寫入 _DB、存檔、刷新畫面。
     */
    function onAllDone() {

      // 確認全域 _DB 存在
      if (typeof _DB === 'undefined') {
        console.error('[SheetsSync] 找不到 _DB，請確認管理後台已初始化。');
        _showSyncResult(btn, notify, false, '找不到 _DB 物件，請確認後台已載入。');
        return;
      }

      // 逐一更新 _DB 各集合
      tasks.forEach(function (t) {
        if (results[t.key]) {
          _DB[t.key] = results[t.key];
          console.log('[SheetsSync] ' + t.sheet + ' → ' + results[t.key].length + ' 筆');
        }
      });

      // 儲存至 localStorage（透過後台提供的 saveData 函式）
      if (typeof saveData === 'function') {
        saveData(_DB);
      } else {
        // 備援：直接寫入 localStorage
        try {
          localStorage.setItem('xinguangAdminDB', JSON.stringify(_DB));
        } catch (e) {
          console.warn('[SheetsSync] localStorage 寫入失敗：', e);
        }
      }

      // 刷新目前顯示的頁面
      if (typeof renderCurrentView === 'function') {
        renderCurrentView();
      } else if (typeof loadView === 'function') {
        loadView();
      } else if (typeof renderTable === 'function') {
        renderTable();
      }

      // 顯示結果訊息
      var ok = errors.length === 0;
      var msg = ok
        ? '✅ 同步完成！共更新 ' +
            Object.values(results).reduce(function (s, arr) { return s + arr.length; }, 0) +
            ' 筆資料。'
        : '⚠️ 部分工作表同步失敗：' + errors.join('、');

      _showSyncResult(btn, notify, ok, msg);
    }

    // 逐一 fetch 每個工作表
    tasks.forEach(function (t) {
      var url = csvUrl(t.sheet);

      fetch(url)
        .then(function (resp) {
          if (!resp.ok) {
            throw new Error('HTTP ' + resp.status);
          }
          return resp.text();
        })
        .then(function (text) {
          var rows    = parseCsv(text);
          var objects = rowsToObjects(rows);
          results[t.key] = objects.map(t.mapper);
        })
        .catch(function (err) {
          console.error('[SheetsSync] 工作表「' + t.sheet + '」讀取失敗：', err);
          errors.push(t.sheet);
        })
        .finally(function () {
          pending--;
          if (pending === 0) onAllDone();
        });
    });
  };

  // ──────────────────────────────────────────────────────────────────
  // 輔助：顯示同步結果
  // ──────────────────────────────────────────────────────────────────

  /**
   * 恢復按鈕狀態並顯示結果文字。
   * @param {HTMLElement|null} btn     - 同步按鈕
   * @param {HTMLElement|null} notify  - 顯示訊息的元素
   * @param {boolean}          success - 是否成功
   * @param {string}           msg     - 訊息文字
   */
  function _showSyncResult(btn, notify, success, msg) {
    if (btn) {
      btn.disabled    = false;
      btn.textContent = '📊 從 Google Sheets 同步';
    }
    if (notify) {
      notify.textContent = msg;
      notify.style.color = success ? '#2B7A4B' : '#C0392B';
    } else {
      // 沒有通知元素時改用 console
      success ? console.info('[SheetsSync]', msg) : console.warn('[SheetsSync]', msg);
    }
  }

  // ──────────────────────────────────────────────────────────────────
  // 頁面載入時，在後台工具列注入「同步按鈕」與「狀態文字」（選用）
  // 若後台 HTML 已手動加入按鈕，此段可刪除。
  // ──────────────────────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', function () {

    // 若頁面上已有 id="btnSheetsSync"，則略過自動注入
    if (document.getElementById('btnSheetsSync')) return;

    // 嘗試找到後台的工具列容器（常見 id 或 class）
    var toolbar =
      document.getElementById('adminToolbar') ||
      document.getElementById('toolbar') ||
      document.querySelector('.admin-toolbar') ||
      document.querySelector('.toolbar') ||
      document.querySelector('header') ||
      document.querySelector('nav');

    if (!toolbar) return; // 找不到就不注入

    // 建立包裝容器
    var wrap = document.createElement('div');
    wrap.style.cssText = 'display:inline-flex;align-items:center;gap:10px;';

    // 建立按鈕
    var syncBtn = document.createElement('button');
    syncBtn.id            = 'btnSheetsSync';
    syncBtn.textContent   = '📊 從 Google Sheets 同步';
    syncBtn.style.cssText =
      'background:#2B7A4B;color:#fff;border:none;border-radius:8px;' +
      'padding:9px 18px;font-size:0.9rem;font-weight:700;cursor:pointer;' +
      'font-family:inherit;transition:background 0.2s;';
    syncBtn.onmouseover = function () { this.style.background = '#1E5C37'; };
    syncBtn.onmouseout  = function () { this.style.background = '#2B7A4B'; };
    syncBtn.onclick     = window.syncFromSheets;

    // 建立狀態文字
    var statusEl = document.createElement('span');
    statusEl.id            = 'sheetsSyncStatus';
    statusEl.style.cssText = 'font-size:0.82rem;color:#7B8794;';

    wrap.appendChild(syncBtn);
    wrap.appendChild(statusEl);
    toolbar.appendChild(wrap);
  });

})();

</script>
